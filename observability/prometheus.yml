global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alerts/*.yml

scrape_configs:
  - job_name: "commerce-app"
    metrics_path: /metrics
    static_configs:
      - targets: ["app:8000"]

  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8888"]
